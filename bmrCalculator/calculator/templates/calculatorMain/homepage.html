<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMR Calculator - Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 750px;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-start {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-start:hover {
            background-color: #219150;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌳 Bem-vindo à Calculadora TMB 🌳</h1>
        <p>
            Descubra sua Taxa Metabólica Basal e organize sua dieta de forma inteligente. 
        </p>
        
        <a href="{% url 'teste123' %}" class="btn-start">
            Começar meu Cálculo
        </a>
    </div>

</body>
</html>
