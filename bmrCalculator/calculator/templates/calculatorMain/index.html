<!DOCTYPE html>
<html>
<head>
    <title>Calculadora TMB</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; }
        input { display: block; margin-bottom: 10px; width: 100%; }
        button { background: #28a745; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Minha TMB</h2>
        <form method="POST">
            {% csrf_token %} <input type="number" name="peso" placeholder="Peso (kg)" required>
            <input type="number" name="age" placeholder="Idade" required>
            <input type="number" step="0.01" name="height" placeholder="Altura (ex: 1.75)" required>
            <input type="date" name="birth_date" required>
            <select name="sex">
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
            </select>
            <button type="submit">Calcular e Salvar</button>
        </form>
    </div>
</body>
</html>
